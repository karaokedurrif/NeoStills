<svg viewBox="0 0 560 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bWood1" cx="28%" cy="26%" r="78%">
      <stop offset="0%" stop-color="#5a3318"/>
      <stop offset="22%" stop-color="#3d2010"/>
      <stop offset="52%" stop-color="#2a1509"/>
      <stop offset="100%" stop-color="#130904"/>
    </radialGradient>
    <radialGradient id="bWood2" cx="30%" cy="24%" r="75%">
      <stop offset="0%" stop-color="#4e2c14"/>
      <stop offset="25%" stop-color="#36190c"/>
      <stop offset="55%" stop-color="#1e0e06"/>
      <stop offset="100%" stop-color="#0e0703"/>
    </radialGradient>
    <radialGradient id="bWood3" cx="32%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#60381c"/>
      <stop offset="24%" stop-color="#42220e"/>
      <stop offset="54%" stop-color="#2c1508"/>
      <stop offset="100%" stop-color="#160a03"/>
    </radialGradient>
    <linearGradient id="hoopSteel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#605040"/>
      <stop offset="18%" stop-color="#7a6848"/>
      <stop offset="48%" stop-color="#3a2e20"/>
      <stop offset="78%" stop-color="#6a5838"/>
      <stop offset="100%" stop-color="#2a2014"/>
    </linearGradient>
    <linearGradient id="rackWood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#281808"/>
      <stop offset="45%" stop-color="#1c1006"/>
      <stop offset="100%" stop-color="#0e0903"/>
    </linearGradient>
    <linearGradient id="tapMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0b090"/>
      <stop offset="50%" stop-color="#807060"/>
      <stop offset="100%" stop-color="#504540"/>
    </linearGradient>
    <radialGradient id="endCap" cx="36%" cy="36%" r="64%">
      <stop offset="0%" stop-color="#5a3818"/>
      <stop offset="52%" stop-color="#2a1608"/>
      <stop offset="100%" stop-color="#0e0703"/>
    </radialGradient>
    <radialGradient id="floorShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="drpShadow">
      <feDropShadow dx="4" dy="8" stdDeviation="7" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- RACK PALLET -->
  <rect x="16" y="286" width="528" height="28" rx="4" fill="url(#rackWood)"/>
  <rect x="16" y="308" width="528" height="16" rx="3" fill="#120c05"/>
  <rect x="16" y="318" width="528" height="34" rx="3" fill="#0d0803"/>
  <!-- Rack legs -->
  <rect x="26" y="286" width="22" height="66" rx="3" fill="#180e05"/>
  <rect x="512" y="286" width="22" height="66" rx="3" fill="#180e05"/>
  <rect x="168" y="286" width="18" height="66" rx="3" fill="#180e05"/>
  <rect x="374" y="286" width="18" height="66" rx="3" fill="#180e05"/>
  <!-- Rack grain -->
  <line x1="50" y1="288" x2="50" y2="312" stroke="#2a1808" stroke-width="2" stroke-opacity="0.45"/>
  <line x1="120" y1="288" x2="120" y2="312" stroke="#2a1808" stroke-width="1.5" stroke-opacity="0.38"/>
  <line x1="220" y1="288" x2="220" y2="312" stroke="#2a1808" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="320" y1="288" x2="320" y2="312" stroke="#2a1808" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="420" y1="288" x2="420" y2="312" stroke="#2a1808" stroke-width="1.5" stroke-opacity="0.38"/>
  <line x1="500" y1="288" x2="500" y2="312" stroke="#2a1808" stroke-width="2" stroke-opacity="0.42"/>

  <!-- BARREL 1 — back left, large -->
  <g filter="url(#drpShadow)" transform="translate(12, 46)">
    <!-- Body -->
    <ellipse cx="152" cy="120" rx="152" ry="108" fill="url(#bWood2)"/>
    <!-- Left end cap -->
    <ellipse cx="20" cy="120" rx="20" ry="108" fill="url(#endCap)" stroke="#3a2010" stroke-width="2" stroke-opacity="0.55"/>
    <!-- Right end cap -->
    <ellipse cx="284" cy="120" rx="20" ry="108" fill="url(#endCap)" stroke="#3a2010" stroke-width="2" stroke-opacity="0.45"/>
    <!-- Stave lines (horizontal barrel = arching lines) -->
    <path d="M20 42 Q152 18 284 42" stroke="#160c04" stroke-width="1.3" stroke-opacity="0.4" fill="none"/>
    <path d="M20 75 Q152 51 284 75" stroke="#160c04" stroke-width="1.1" stroke-opacity="0.32" fill="none"/>
    <path d="M20 108 Q152 84 284 108" stroke="#160c04" stroke-width="1.1" stroke-opacity="0.28" fill="none"/>
    <path d="M20 140 Q152 116 284 140" stroke="#160c04" stroke-width="1.1" stroke-opacity="0.28" fill="none"/>
    <path d="M20 173 Q152 149 284 173" stroke="#160c04" stroke-width="1.1" stroke-opacity="0.3" fill="none"/>
    <path d="M20 205 Q152 181 284 205" stroke="#160c04" stroke-width="1.2" stroke-opacity="0.36" fill="none"/>
    <!-- Specular highlight top-left -->
    <ellipse cx="88" cy="68" rx="62" ry="34" fill="#c07838" fill-opacity="0.09" transform="rotate(-8 88 68)"/>
    <ellipse cx="68" cy="56" rx="36" ry="18" fill="#e09040" fill-opacity="0.07" transform="rotate(-10 68 56)"/>
    <!-- Hoops — 3 dark iron rings -->
    <ellipse cx="62" cy="120" rx="62" ry="108" fill="none" stroke="url(#hoopSteel)" stroke-width="14"/>
    <ellipse cx="152" cy="120" rx="152" ry="108" fill="none" stroke="url(#hoopSteel)" stroke-width="15"/>
    <ellipse cx="242" cy="120" rx="62" ry="108" fill="none" stroke="url(#hoopSteel)" stroke-width="14"/>
    <!-- Hoop highlight edge -->
    <ellipse cx="62" cy="120" rx="62" ry="108" fill="none" stroke="#9a8060" stroke-width="1" stroke-opacity="0.25"/>
    <ellipse cx="242" cy="120" rx="62" ry="108" fill="none" stroke="#9a8060" stroke-width="1" stroke-opacity="0.22"/>
    <!-- Bung on top -->
    <ellipse cx="152" cy="20" rx="12" ry="7" fill="#160c04" stroke="#4a3018" stroke-width="2.5" opacity="0.92"/>
    <ellipse cx="152" cy="20" rx="6" ry="3.5" fill="#3a2010" opacity="0.85"/>
    <!-- Tap faucet on left end -->
    <ellipse cx="18" cy="152" rx="9" ry="5.5" fill="url(#tapMetal)"/>
    <rect x="3" y="150" width="15" height="5" rx="2.5" fill="url(#tapMetal)"/>
    <path d="M1 157 Q5 165 7 170" stroke="#907868" stroke-width="3" stroke-linecap="round" fill="none"/>
    <circle cx="7" cy="172" r="3" fill="#705848" fill-opacity="0.7"/>
  </g>

  <!-- BARREL 2 — front center, medium -->
  <g filter="url(#drpShadow)" transform="translate(162, 124)">
    <ellipse cx="128" cy="100" rx="128" ry="88" fill="url(#bWood3)"/>
    <ellipse cx="17" cy="100" rx="17" ry="88" fill="url(#endCap)" stroke="#3a2010" stroke-width="2" stroke-opacity="0.55"/>
    <ellipse cx="239" cy="100" rx="17" ry="88" fill="url(#endCap)" stroke="#3a2010" stroke-width="2" stroke-opacity="0.45"/>
    <!-- Staves -->
    <path d="M17 36 Q128 14 239 36" stroke="#160c04" stroke-width="1.2" stroke-opacity="0.38" fill="none"/>
    <path d="M17 66 Q128 44 239 66" stroke="#160c04" stroke-width="1.0" stroke-opacity="0.3" fill="none"/>
    <path d="M17 96 Q128 74 239 96" stroke="#160c04" stroke-width="1.0" stroke-opacity="0.26" fill="none"/>
    <path d="M17 126 Q128 104 239 126" stroke="#160c04" stroke-width="1.0" stroke-opacity="0.26" fill="none"/>
    <path d="M17 156 Q128 134 239 156" stroke="#160c04" stroke-width="1.0" stroke-opacity="0.28" fill="none"/>
    <path d="M17 182 Q128 160 239 182" stroke="#160c04" stroke-width="1.1" stroke-opacity="0.34" fill="none"/>
    <!-- Specular -->
    <ellipse cx="74" cy="56" rx="52" ry="28" fill="#c07838" fill-opacity="0.08" transform="rotate(-9 74 56)"/>
    <!-- Hoops -->
    <ellipse cx="52" cy="100" rx="52" ry="88" fill="none" stroke="url(#hoopSteel)" stroke-width="12"/>
    <ellipse cx="128" cy="100" rx="128" ry="88" fill="none" stroke="url(#hoopSteel)" stroke-width="13"/>
    <ellipse cx="204" cy="100" rx="52" ry="88" fill="none" stroke="url(#hoopSteel)" stroke-width="12"/>
    <ellipse cx="52" cy="100" rx="52" ry="88" fill="none" stroke="#9a8060" stroke-width="0.8" stroke-opacity="0.22"/>
    <!-- Bung -->
    <ellipse cx="128" cy="17" rx="10" ry="6" fill="#160c04" stroke="#4a3018" stroke-width="2" opacity="0.9"/>
    <ellipse cx="128" cy="17" rx="5" ry="3" fill="#3a2010" opacity="0.85"/>
    <!-- Label -->
    <text x="128" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6a4820" fill-opacity="0.5" letter-spacing="0.5">OLF</text>
    <!-- Tap -->
    <ellipse cx="17" cy="126" rx="8" ry="5" fill="url(#tapMetal)"/>
    <rect x="3" y="124" width="14" height="4.5" rx="2" fill="url(#tapMetal)"/>
    <path d="M1 130 Q5 137 6 142" stroke="#907868" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <circle cx="6" cy="144" r="2.5" fill="#705848" fill-opacity="0.7"/>
  </g>

  <!-- BARREL 3 — back right -->
  <g filter="url(#drpShadow)" transform="translate(294, 38)">
    <ellipse cx="140" cy="114" rx="140" ry="100" fill="url(#bWood1)"/>
    <ellipse cx="19" cy="114" rx="19" ry="100" fill="url(#endCap)" stroke="#3a2010" stroke-width="2" stroke-opacity="0.52"/>
    <ellipse cx="261" cy="114" rx="19" ry="100" fill="url(#endCap)" stroke="#3a2010" stroke-width="2" stroke-opacity="0.44"/>
    <!-- Staves -->
    <path d="M19 38 Q140 16 261 38" stroke="#160c04" stroke-width="1.3" stroke-opacity="0.38" fill="none"/>
    <path d="M19 70 Q140 48 261 70" stroke="#160c04" stroke-width="1.1" stroke-opacity="0.3" fill="none"/>
    <path d="M19 102 Q140 80 261 102" stroke="#160c04" stroke-width="1.1" stroke-opacity="0.26" fill="none"/>
    <path d="M19 134 Q140 112 261 134" stroke="#160c04" stroke-width="1.1" stroke-opacity="0.26" fill="none"/>
    <path d="M19 166 Q140 144 261 166" stroke="#160c04" stroke-width="1.1" stroke-opacity="0.28" fill="none"/>
    <path d="M19 196 Q140 174 261 196" stroke="#160c04" stroke-width="1.2" stroke-opacity="0.35" fill="none"/>
    <!-- Specular -->
    <ellipse cx="80" cy="62" rx="57" ry="30" fill="#c07838" fill-opacity="0.09" transform="rotate(-8 80 62)"/>
    <!-- Hoops -->
    <ellipse cx="57" cy="114" rx="57" ry="100" fill="none" stroke="url(#hoopSteel)" stroke-width="13"/>
    <ellipse cx="140" cy="114" rx="140" ry="100" fill="none" stroke="url(#hoopSteel)" stroke-width="14"/>
    <ellipse cx="223" cy="114" rx="57" ry="100" fill="none" stroke="url(#hoopSteel)" stroke-width="13"/>
    <ellipse cx="57" cy="114" rx="57" ry="100" fill="none" stroke="#9a8060" stroke-width="0.8" stroke-opacity="0.2"/>
    <!-- Bung -->
    <ellipse cx="140" cy="21" rx="11" ry="6.5" fill="#160c04" stroke="#4a3018" stroke-width="2.5" opacity="0.9"/>
    <!-- IoT sensor -->
    <circle cx="232" cy="52" r="13" fill="#060f1c" stroke="#22d3ee" stroke-width="2.2" opacity="0.96"/>
    <circle cx="232" cy="52" r="7" fill="#22d3ee" fill-opacity="0.92"/>
    <circle cx="232" cy="52" r="16" fill="#22d3ee" fill-opacity="0.07"/>
    <path d="M219 38 Q232 27 245 38" stroke="#22d3ee" stroke-width="2" fill="none" stroke-opacity="0.7" stroke-linecap="round"/>
    <path d="M213 32 Q232 18 251 32" stroke="#22d3ee" stroke-width="1.4" fill="none" stroke-opacity="0.38" stroke-linecap="round"/>
    <text x="252" y="42" font-family="monospace" font-size="7.5" fill="#22d3ee" fill-opacity="0.75">→ IoT</text>
  </g>

  <!-- Floor shadow -->
  <ellipse cx="280" cy="350" rx="255" ry="14" fill="url(#floorShadow)"/>
</svg>
